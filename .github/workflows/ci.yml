name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

# Cancel superseded runs (e.g. force-push to a PR) to save CI minutes.
# `cleanup-report` is intentionally not in the group: it runs on close
# and must not be cancelled by an in-flight PR run.
concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Default to read-only; jobs override only what they need.
permissions:
  contents: read

jobs:
  lint:
    name: Lint
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Cache Bun install
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun checks

  storybook:
    name: Storybook Tests
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Cache Bun install
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        # Playwright officially recommends against caching browser binaries:
        # the apt deps installed by --with-deps cannot be cached, and the
        # binary download is comparable in time to a cache restore.
        run: bunx playwright install chromium --with-deps
        working-directory: apps/web

      - name: Run Storybook tests
        run: bun run test
        working-directory: apps/web

  e2e:
    name: E2E Tests (shard ${{ matrix.shard }}/${{ strategy.job-total }})
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    permissions:
      contents: write # for gh-pages report push
      pull-requests: write # for the report comment
    services:
      # Uses Electric SQL's public Postgres image with wal_level=logical pre-configured.
      # This avoids the need to ALTER SYSTEM + restart Postgres at runtime.
      # See: https://github.com/electric-sql/electric/blob/main/.github/workflows/build_postgres_image.yml
      postgres:
        image: ghcr.io/electric-sql/electric/postgres:18-alpine-logical
        env:
          POSTGRES_DB: openfeeds_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d openfeeds_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      electric:
        # Pinned to avoid silent breakage from upstream releases.
        # Server is forward-compatible with @electric-sql/client ^1.5.x.
        image: electricsql/electric:1.6.4
        env:
          DATABASE_URL: postgresql://postgres:postgres@postgres:5432/openfeeds_test?sslmode=disable
          ELECTRIC_INSECURE: 'true'
        ports:
          - 3406:3000
        options: >-
          --health-cmd "curl -sf http://localhost:3000/v1/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/openfeeds_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      BASE_URL: http://localhost:3400
      TRUSTED_ORIGINS: http://localhost:3400
      BETTER_AUTH_SECRET: e2e-test-secret-not-for-production-use-only
      SIMPLE_AUTH: 'true'
      ELECTRIC_URL: http://localhost:3406
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CI: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Cache Bun install
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        # ubuntu-latest already has the system libs Chromium needs, so we skip
        # --with-deps to save ~30-60s of apt-get on every run.
        run: bunx playwright install chromium
        working-directory: apps/e2e

      - name: Run migrations
        run: bun --cwd=apps/migrator src/index.ts

      - name: Build @repo/emails
        run: bun run --cwd packages/emails build

      # Build the SPA so the server can serve it (SERVE_SPA below). Mirrors the
      # production Docker image: one process serves /api/* + the SPA from the
      # real prod bundle. Catches build-time issues that `vite dev` would hide.
      - name: Build web SPA
        run: bun run --cwd apps/web build

      - name: Symlink web dist into server
        run: ln -s "$GITHUB_WORKSPACE/apps/web/dist" "$GITHUB_WORKSPACE/apps/server/web-dist"

      # Single process serves /api/* + the SPA on :3400 — same port as the
      # dev Vite server, so BASE_URL/TRUSTED_ORIGINS/E2E defaults stay
      # consistent between local dev and CI.
      #
      # Logs go to /tmp/server.log so the wait step (and any later failure) can
      # surface boot errors instead of "Server failed to start" with no cause.
      # PID saved so a final cleanup step can kill it on success or failure.
      - name: Start server + SPA
        run: |
          bun --cwd=apps/server --bun src/index.ts > /tmp/server.log 2>&1 &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"
        env:
          SERVER_PORT: '3400'
          SERVE_SPA: 'true'

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:3400 > /dev/null 2>&1; then
              echo "Server is ready"
              exit 0
            fi
            # Bail early if the process died — no point waiting 60s.
            if ! kill -0 "$SERVER_PID" 2>/dev/null; then
              echo "Server process exited before becoming ready. Logs:"
              cat /tmp/server.log || true
              exit 1
            fi
            echo "Waiting for server... ($i/30)"
            sleep 2
          done
          echo "Server failed to start. Logs:"
          cat /tmp/server.log || true
          exit 1

      - name: Run E2E tests
        # No --update-snapshots: CI must fail on visual regressions, not
        # silently regenerate. Use the 'Update E2E snapshots' workflow
        # (workflow_dispatch) to refresh snapshots from a PR branch.
        run: bunx playwright test --shard=${{ matrix.shard }}/${{ strategy.job-total }}
        working-directory: apps/e2e

      - name: Dump server logs on failure
        if: failure()
        run: |
          echo "=== /tmp/server.log ==="
          cat /tmp/server.log || echo "(no log file)"

      - name: Stop server
        if: always()
        run: |
          if [ -n "${SERVER_PID:-}" ] && kill -0 "$SERVER_PID" 2>/dev/null; then
            kill "$SERVER_PID" || true
          fi
      - name: Publish report to GitHub Pages
        if: ${{ !cancelled() }}
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SHARD: ${{ matrix.shard }}
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          PR_DIR="playwright-report/pr-${PR_NUMBER}/shard-${SHARD}"
          # Clone gh-pages into a separate directory to avoid conflicts with working tree
          git clone --single-branch --branch gh-pages "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" gh-pages-deploy
          cd gh-pages-deploy
          rm -rf "$PR_DIR"
          mkdir -p "$PR_DIR"
          cp -r "$GITHUB_WORKSPACE/apps/e2e/playwright-report/"* "$PR_DIR/"
          git add "$PR_DIR"
          git -c user.name="github-actions" -c user.email="github-actions@github.com" \
            commit -m "chore: update playwright report for PR #${PR_NUMBER} shard ${SHARD}" --allow-empty
          # Retry on push race with concurrent E2E runs writing to gh-pages.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "gh-pages push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push failed (attempt $attempt), rebasing on remote and retrying..."
            git fetch origin gh-pages
            git rebase origin/gh-pages
            sleep $((attempt * 2))
          done
          echo "gh-pages push failed after 5 attempts"
          exit 1

      - name: Post report comment
        if: ${{ !cancelled() }}
        uses: daun/playwright-report-summary@1229105480a2a4bdd91598d8a146fbab41343fce # v3.11.0
        with:
          report-file: apps/e2e/results.json
          comment-title: 'Playwright E2E Report (shard ${{ matrix.shard }}/${{ strategy.job-total }})'
          report-url: 'https://cyrillbrito.github.io/openfeeds/playwright-report/pr-${{ github.event.pull_request.number }}/shard-${{ matrix.shard }}/'

  # Clean up GitHub Pages report when PR is closed/merged
  cleanup-report:
    name: Cleanup Report
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: gh-pages

      - name: Remove PR report
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ -d "playwright-report/pr-${PR_NUMBER}" ]; then
            rm -rf "playwright-report/pr-${PR_NUMBER}"
            git add -A
            git -c user.name="github-actions" -c user.email="github-actions@github.com" \
              commit -m "chore: remove playwright report for PR #${PR_NUMBER}" --allow-empty
            # Retry on push race with concurrent E2E runs writing to gh-pages.
            for attempt in 1 2 3 4 5; do
              if git push origin gh-pages; then
                exit 0
              fi
              echo "Push failed (attempt $attempt), pulling and retrying..."
              git pull --rebase origin gh-pages
              sleep $((attempt * 2))
            done
            echo "gh-pages push failed after 5 attempts"
            exit 1
          else
            echo "No report found for PR #${PR_NUMBER}, skipping"
          fi
