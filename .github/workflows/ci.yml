name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun checks

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    services:
      # Uses Electric SQL's public Postgres image with wal_level=logical pre-configured.
      # This avoids the need to ALTER SYSTEM + restart Postgres at runtime.
      # See: https://github.com/electric-sql/electric/blob/main/.github/workflows/build_postgres_image.yml
      postgres:
        image: ghcr.io/electric-sql/electric/postgres:18-alpine-logical
        env:
          POSTGRES_DB: openfeeds_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d openfeeds_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      electric:
        image: electricsql/electric:latest
        env:
          DATABASE_URL: postgresql://postgres:postgres@postgres:5432/openfeeds_test?sslmode=disable
          ELECTRIC_INSECURE: 'true'
        ports:
          - 3060:3000
        options: >-
          --health-cmd "curl -sf http://localhost:3000/v1/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/openfeeds_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      BASE_URL: http://localhost:3000
      TRUSTED_ORIGINS: http://localhost:3000
      BETTER_AUTH_SECRET: e2e-test-secret-not-for-production-use-only
      SIMPLE_AUTH: 'true'
      ELECTRIC_URL: http://localhost:3060
      CI: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install chromium --with-deps
        working-directory: apps/e2e

      - name: Run migrations
        run: bun --cwd=apps/migrator src/index.ts

      - name: Build @repo/emails
        run: bun run --cwd packages/emails build

      - name: Start web server
        run: bun --cwd=apps/web --bun vite dev --port 3000 &

      - name: Wait for web server
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:3000 > /dev/null 2>&1; then
              echo "Web server is ready"
              exit 0
            fi
            echo "Waiting for web server... ($i/30)"
            sleep 2
          done
          echo "Web server failed to start"
          exit 1

      - name: Run E2E tests
        run: bunx playwright test
        working-directory: apps/e2e

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/e2e/playwright-report/
          retention-days: 14
