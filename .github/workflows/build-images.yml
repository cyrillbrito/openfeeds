name: Build and Push Docker Images

# Triggers:
# - push: main          → build + publish 'edge' on every main commit, except
#                         release-please merge commits (which would double-build
#                         since the workflow_call below also fires for them).
# - workflow_call       → invoked from release-please.yml on tagged releases;
#                         publishes 'edge', 'latest' and the version tag.
# - workflow_dispatch   → manual builds; with a tag publishes 'latest' + tag.
on:
  push:
    branches: [main]
  workflow_call:
    inputs:
      tag:
        description: 'Version tag for Docker images (e.g. v1.0.0)'
        required: true
        type: string
    secrets:
      POSTHOG_PROJECT_ID:
        required: true
      POSTHOG_CLI_API_KEY:
        required: true
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag for Docker images (leave empty for edge only)'
        required: false
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.name }}
    # Skip the push trigger on release-please merge commits: release-please
    # invokes this workflow via workflow_call right after merging, so a push-
    # triggered run would build the same commit a second time.
    #
    # Gating on `inputs.tag` (not `github.event_name`) because inside a
    # reusable workflow `github.event_name` reflects the caller's event
    # (still `push` for the release-please merge), not `workflow_call`.
    # `inputs.tag` is empty on the native push trigger and populated on
    # workflow_call (from release-please.yml) and workflow_dispatch.
    if: >-
      inputs.tag != '' ||
      !startsWith(github.event.head_commit.message, 'chore(main): release')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # server: bundles the built SPA (apps/web/dist) and serves it from Hono
          # alongside /api/*. Prune scope includes both packages so the web
          # build output lands in the same pruned tree.
          - name: server
            packages: '@repo/server @repo/web'
            image: ghcr.io/cyrillbrito/openfeeds-web
            dockerfile: apps/server/Dockerfile
            build: true
            sourcemaps: true
          # Worker has a build step but no sourcemap upload.
          - name: worker
            packages: '@repo/worker'
            image: ghcr.io/cyrillbrito/openfeeds-worker
            dockerfile: apps/worker/Dockerfile
            build: true
            sourcemaps: false
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Cache Bun install
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Prune monorepo
        run: bunx turbo@^2 prune ${{ matrix.packages }}

      # --frozen-lockfile omitted: bun false-positive on turbo-pruned lockfiles (oven-sh/bun#26973)
      - name: Install dependencies
        run: bun install
        working-directory: out

      - name: Build
        if: matrix.build
        run: bun run build
        working-directory: out

      - name: Read version from package.json
        if: matrix.sourcemaps
        id: version
        run: echo "value=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"
        working-directory: out

      - name: Upload sourcemaps to PostHog
        if: matrix.sourcemaps
        uses: PostHog/upload-source-maps@991172e085213c222c61d2ba6a0b9e57c81e5066 # v2.0.0
        with:
          directory: out/apps/web/dist
          project-id: ${{ secrets.POSTHOG_PROJECT_ID }}
          api-key: ${{ secrets.POSTHOG_CLI_API_KEY }}
          host: https://eu.posthog.com
          release-name: web
          release-version: ${{ steps.version.outputs.value }}
          delete-after-upload: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ matrix.image }}
          tags: |
            type=edge,branch=main
            type=raw,value=latest,enable=${{ inputs.tag != '' }}
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Per-image GHA cache keeps web/worker layers separate.
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
