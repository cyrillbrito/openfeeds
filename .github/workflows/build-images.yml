name: Build and Push Docker Images

# Triggers:
# - push: main          → build + publish 'edge' on every main commit, except
#                         release-please merge commits (which would double-build
#                         since the workflow_call below also fires for them).
# - workflow_call       → invoked from release-please.yml on tagged releases;
#                         publishes 'edge', 'latest' and the version tag.
# - workflow_dispatch   → manual builds; with a tag publishes 'latest' + tag.
on:
  push:
    branches: [main]
  workflow_call:
    inputs:
      tag:
        description: 'Version tag for Docker images (e.g. v1.0.0)'
        required: true
        type: string
    secrets:
      POSTHOG_PROJECT_ID:
        required: true
      POSTHOG_CLI_API_KEY:
        required: true
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag for Docker images (leave empty for edge only)'
        required: false
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.name }}
    # Skip the push trigger on release-please merge commits: release-please
    # invokes this workflow via workflow_call right after merging, so a push-
    # triggered run would build the same commit a second time.
    if: >-
      github.event_name != 'push' ||
      !startsWith(github.event.head_commit.message, 'chore(main): release')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Web has a build step + sourcemap upload to PostHog.
          - name: web
            package: '@repo/web'
            image: ghcr.io/cyrillbrito/openfeeds-web
            dockerfile: apps/web/Dockerfile
            build: true
            sourcemaps: true
          # Worker has a build step but no sourcemap upload.
          - name: worker
            package: '@repo/worker'
            image: ghcr.io/cyrillbrito/openfeeds-worker
            dockerfile: apps/worker/Dockerfile
            build: true
            sourcemaps: false
          # Migrator has no build step (runs TS directly).
          - name: migrator
            package: '@repo/migrator'
            image: ghcr.io/cyrillbrito/openfeeds-migrations
            dockerfile: apps/migrator/Dockerfile
            build: false
            sourcemaps: false
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Cache Bun install
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Prune monorepo
        run: bunx turbo@^2 prune ${{ matrix.package }}

      # --frozen-lockfile omitted: bun false-positive on turbo-pruned lockfiles (oven-sh/bun#26973)
      - name: Install dependencies
        run: bun install
        working-directory: out

      - name: Build
        if: matrix.build
        run: bun run build
        working-directory: out

      - name: Read version from package.json
        if: matrix.sourcemaps
        id: version
        run: echo "value=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"
        working-directory: out

      - name: Upload sourcemaps to PostHog
        if: matrix.sourcemaps
        uses: PostHog/upload-source-maps@991172e085213c222c61d2ba6a0b9e57c81e5066 # v2.0.0
        with:
          directory: out/apps/web/.output
          project-id: ${{ secrets.POSTHOG_PROJECT_ID }}
          api-key: ${{ secrets.POSTHOG_CLI_API_KEY }}
          host: https://eu.posthog.com
          release-name: web
          release-version: ${{ steps.version.outputs.value }}
          delete-after-upload: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ matrix.image }}
          tags: |
            type=edge,branch=main
            type=raw,value=latest,enable=${{ inputs.tag != '' }}
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Per-image GHA cache keeps web/worker/migrator layers separate.
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
