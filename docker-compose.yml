services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - rss-network
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning

  rsshub:
    image: diygod/rsshub:latest
    ports:
      - '1200:1200'
    environment:
      # Cache settings
      - CACHE_TYPE=redis
      - REDIS_URL=redis://redis:6379/
      # Twitter/X credentials (optional - for authenticated routes)
      - TWITTER_USERNAME=$TWITTER_USERNAME
      - TWITTER_PASSWORD=$TWITTER_PASSWORD
      - TWITTER_AUTH_TOKEN=$TWITTER_AUTH_TOKEN
      # Rate limiting
      - REQUEST_TIMEOUT=60000
    depends_on:
      - redis
    networks:
      - rss-network
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - '3200:3000'
    environment:
      - CLIENT_DOMAIN=$CLIENT_DOMAIN
      - DB_PATH=/data
      - BETTER_AUTH_SECRET=$BETTER_AUTH_SECRET
      - SIMPLE_AUTH=$SIMPLE_AUTH
      - POSTHOG_PUBLIC_KEY=$POSTHOG_PUBLIC_KEY
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RSSHUB_URL=http://rsshub:1200
    volumes:
      - sqlite_data:/data
    depends_on:
      - redis
      - rsshub
    networks:
      - rss-network
    restart: unless-stopped

  # api:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.api
  #   ports:
  #     - '3201:3001'
  #   environment:
  #     - DB_PATH=/data
  #     - CLIENT_DOMAIN=$CLIENT_DOMAIN
  #     - ENABLE_CORS=$ENABLE_CORS
  #     - BETTER_AUTH_SECRET=$BETTER_AUTH_SECRET
  #     - SIMPLE_AUTH=$SIMPLE_AUTH
  #     - POSTHOG_PUBLIC_KEY=$POSTHOG_PUBLIC_KEY
