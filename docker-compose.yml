  #     - sqlite_data:/data
  #   networks:
  #     - rss-network
  #   depends_on:
  #     - redis
  #   restart: unless-stopped

volumes:
  sqlite_data:
    driver: local
  redis_data:
    driver: local

networks:
  rss-network:
    driver: bridge
